<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DTC - Master Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00d4ff; 
            --bg: #0a0a0a; 
            --card: #151515; 
            --vip: #ffaa00; 
            --danger: #ff4444;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px var(--neon); text-align: center; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; user-select: none; margin-bottom: 20px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-card { background: var(--card); border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-number { display: block; font-size: 18px; font-weight: bold; color: var(--neon); }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; background: #222; border-radius: 8px; border: 1px solid #444; padding: 5px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; background: transparent; color: #fff; outline: none; font-size: 16px; }
        .btn-voz { background: none; border: none; color: var(--neon); font-size: 20px; cursor: pointer; padding: 0 10px; }
        .btn-busca { background: var(--neon); color: #000; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .relato-box { background: rgba(0, 212, 255, 0.05); border-left: 3px solid var(--neon); padding: 10px; margin-top: 8px; border-radius: 4px; font-size: 13px; color: #eee; }
        .btn-relatar { background: transparent; border: 1px solid #444; color: #888; padding: 8px; border-radius: 6px; width: 100%; margin-top: 15px; cursor: pointer; font-size: 11px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #333; }
        .btn-pdf { background: #555; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

    <h1 class="neon-text" ondblclick="acessoAdmin()">EURO <span style="color:white">DTC</span> MASTER</h1>
    
    <div class="dashboard">
        <div class="stat-card"> <span class="stat-number" id="countScania">--</span> <span class="stat-label">Scania</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countVolvo">--</span> <span class="stat-label">Volvo</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countParams">--</span> <span class="stat-label">Progs</span> </div>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="dtcInput" placeholder="Código DTC ou Peça...">
            <button class="btn-voz" onclick="iniciarVoz()"><i class="fas fa-microphone"></i></button>
            <button class="btn-busca" onclick="buscarGeral()">BUSCAR</button>
        </div>
    </div>

    <div id="resultado"></div>

    <script>
        const _URL = "https://dslhbphcegqgsraxvsgd.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbGhicGhjZWdxZ3NyYXh2c2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk1NjgsImV4cCI6MjA5MDQwNTU2OH0.qGS7nMN1EXw2MhOFL8ur-U6zrxYSppOk0puIUpuE--s";
        const supabaseClient = supabase.createClient(_URL, _KEY);

        function acessoAdmin() {
            const senha = prompt("Acesso Restrito. Digite o código mestre:");
            if (senha === "1234") { window.location.href = "admin.html"; }
            else { alert("Acesso negado."); }
        }

        async function initDashboard() {
            try {
                const { count: s } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).ilike('marca', 'Scania');
                const { count: v } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).ilike('marca', 'Volvo');
                const { count: p } = await supabaseClient.from('parametros_programacao').select('*', { count: 'exact', head: true });
                document.getElementById('countScania').innerText = s ?? 0;
                document.getElementById('countVolvo').innerText = v ?? 0;
                document.getElementById('countParams').innerText = p ?? 0;
            } catch (e) { console.error("Erro Dashboard:", e); }
        }

        async function buscarGeral() {
            let buscaRaw = document.getElementById('dtcInput').value.trim().toUpperCase();
            if(!buscaRaw) return;
            const resDiv = document.getElementById('resultado');
            resDiv.innerHTML = "<p style='text-align:center; color:var(--neon)'>Analisando Protocolo Master...</p>";

            let { data: falhas, error: errF } = await supabaseClient.from('falhas_dtc').select('*').eq('codigo', buscaRaw);

            if ((!falhas || falhas.length === 0) && buscaRaw.startsWith('50') && buscaRaw.length === 4) {
                const codigoSugestao = buscaRaw + '0';
                const { data: falhasScania } = await supabaseClient.from('falhas_dtc').select('*').eq('codigo', codigoSugestao);
                if (falhasScania && falhasScania.length > 0) { falhas = falhasScania; buscaRaw = codigoSugestao; }
            }

            const { data: relatos } = await supabaseClient.from('relatos_usuarios').select('*').eq('dtc_vinculado', buscaRaw).neq('status_info', 'pendente');
            resDiv.innerHTML = "";

            if (errF || (!falhas?.length && !relatos?.length)) {
                resDiv.innerHTML = `<div class='card' style="border-left: 4px solid var(--danger);"><h3 style="color: var(--danger);">CÓDIGO ${buscaRaw} NÃO LOCALIZADO</h3><p>Protocolo não consta na Master Intelligence.</p></div>`;
                return;
            }

            falhas.forEach(item => {
                const ehECA = item.modulo === 'ECA' || item.codigo.startsWith('50');
                const rDesteDTC = relatos?.filter(r => r.dtc_vinculado === item.codigo) || [];

                resDiv.innerHTML += `
                <div class='card' style="border-left: 4px solid ${ehECA ? 'var(--danger)' : 'var(--neon)'}; padding: 0; overflow: hidden;">
                    <div style="background: #222; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
                        <span style="color: ${ehECA ? 'var(--danger)' : 'var(--neon)'}; font-weight: bold; font-size: 12px;">
                            <i class="fas fa-truck-moving"></i> ${item.marca.toUpperCase()} | ${item.modulo}
                        </span>
                        <button class="btn-pdf" onclick="gerarLaudo('${item.codigo}', '${item.marca}', '${item.modulo}', '${item.descricao.replace(/'/g, "\\'")}', '${item.solucao_vip.replace(/'/g, "\\'")}')">LAUDO TÉCNICO</button>
                    </div>
                    <div style="padding: 20px;">
                        <h2 style="margin: 0; font-size: 24px; color: #fff;">DTC: ${item.codigo}</h2>
                        <p style="color: #ccc; margin: 15px 0;">${item.descricao}</p>
                        <div style="border: 1px solid var(--neon); padding: 12px; border-radius: 6px; background: rgba(0,212,255,0.08)">
                            <b style="color: #00ff00; text-transform: uppercase; font-size: 10px;">SOLUÇÃO VIP MASTER</b>
                            <p style="margin: 5px 0; color: #fff; font-weight: 600;">${item.solucao_vip}</p>
                        </div>
                    </div>
                </div>`;
            });
        }

        function gerarLaudo(codigo, marca, modulo, desc, solucao) {
            const win = window.open('', '_blank');
            win.document.write(`
                <html><head><title>Laudo - ${codigo}</title><style>
                    body { font-family: sans-serif; padding: 40px; color: #333; }
                    .header { border-bottom: 3px solid #00d4ff; padding-bottom: 10px; margin-bottom: 20px; }
                    .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
                    .box { background: #f4f4f4; padding: 15px; margin: 20px 0; border-radius: 5px; }
                    h3 { color: #00d4ff; margin-bottom: 5px; }
                </style></head><body>
                    <div class="header"><div class="logo">EURO DIESEL MECATRÔNICA</div></div>
                    <div class="box"><b>VEÍCULO:</b> ${marca.toUpperCase()} | <b>MÓDULO:</b> ${modulo} | <b>DTC:</b> ${codigo}</div>
                    <h3>ANÁLISE TÉCNICA</h3><p>${desc}</p>
                    <h3>RESOLUÇÃO SUGERIDA</h3><p>${solucao}</p>
                    <div style="margin-top:50px; border-top:1px solid #ccc; padding-top:10px; text-align:center;">
                        <b>Responsável: Leandro - Euro Diesel</b>
                    </div>
                    <script>setTimeout(() => { window.print(); window.close(); }, 500);<\/script>
                </body></html>
            `);
            win.document.close();
        }

        function iniciarVoz() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';
            recognition.start();
            recognition.onresult = (e) => {
                document.getElementById('dtcInput').value = e.results[0][0].transcript.toUpperCase().replace(".","");
                buscarGeral();
            };
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
