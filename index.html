<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DTC - Master Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></script>
    <style>
        :root { 
    --neon: #00d4ff; 
    --bg: #0a0a0a; 
    --card: #151515; 
    --vip: #ffaa00; 
    --danger: #ff4444; /* ADICIONE ESTA LINHA */
}
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px var(--neon); text-align: center; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; user-select: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-card { background: var(--card); border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-number { display: block; font-size: 18px; font-weight: bold; color: var(--neon); }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; background: #222; border-radius: 8px; border: 1px solid #444; padding: 5px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; background: transparent; color: #fff; outline: none; font-size: 16px; }
        .btn-voz { background: none; border: none; color: var(--neon); font-size: 20px; cursor: pointer; padding: 0 10px; }
        .btn-busca { background: var(--neon); color: #000; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .relato-box { padding: 12px; margin-top: 10px; border-radius: 6px; font-size: 13px; line-height: 1.4; background: rgba(255, 255, 255, 0.05); }
        .btn-relatar { background: transparent; border: 1px solid #444; color: #888; padding: 8px; border-radius: 6px; width: 100%; margin-top: 15px; cursor: pointer; font-size: 11px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #333; }
    </style>
</head>
<body>

    <h1 class="neon-text" ondblclick="acessoAdmin()">EURO <span style="color:white">DTC</span> MASTER</h1>
    
    <div class="dashboard">
        <div class="stat-card"> <span class="stat-number" id="countScania">--</span> <span class="stat-label">Scania</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countVolvo">--</span> <span class="stat-label">Volvo</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countParams">--</span> <span class="stat-label">Progs</span> </div>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="dtcInput" placeholder="Código DTC ou Peça...">
            <button class="btn-voz" onclick="iniciarVoz()"><i class="fas fa-microphone"></i></button>
            <button class="btn-busca" onclick="buscarGeral()">BUSCAR</button>
        </div>
    </div>

    <div id="resultado"></div>

    <script>
        // Configurações Base
        const _URL = "https://dslhbphcegqgsraxvsgd.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbGhicGhjZWdxZ3NyYXh2c2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk1NjgsImV4cCI6MjA5MDQwNTU2OH0.qGS7nMN1EXw2MhOFL8ur-U6zrxYSppOk0puIUpuE--s";
        const supabaseClient = supabase.createClient(_URL, _KEY);

        // 1. Acesso Secreto
        function acessoAdmin() {
            const senha = prompt("Acesso Restrito. Digite o código mestre:");
            if (senha === "1234") { 
                window.location.href = "admin.html";
            } else {
                alert("Acesso negado.");
            }
        }

        // 2. Dashboard
        async function initDashboard() {
            try {
                // Adicionamos um pequeno delay para garantir que a conexão Supabase esteja ativa
                const { count: s, error: errS } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).ilike('marca', 'Scania');
                const { count: v, error: errV } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).ilike('marca', 'Volvo');
                const { count: p, error: errP } = await supabaseClient.from('parametros_programacao').select('*', { count: 'exact', head: true });
                
                if(errS || errV || errP) {
                    console.warn("Aguardando resposta do banco...");
                    // Tenta novamente após 2 segundos se falhar
                    setTimeout(initDashboard, 2000);
                    return;
                }

                document.getElementById('countScania').innerText = s !== null ? s : 0;
                document.getElementById('countVolvo').innerText = v !== null ? v : 0;
                document.getElementById('countParams').innerText = p !== null ? p : 0;
            } catch (e) { 
                console.error("Erro no Dashboard:", e); 
            }
        }

        // 3. Busca Exata e Inteligente
        async function buscarGeral() {
            let buscaRaw = document.getElementById('dtcInput').value.trim();
            if(!buscaRaw) return;
            const resDiv = document.getElementById('resultado');
            resDiv.innerHTML = "<p style='text-align:center; color:var(--neon)'>Analisando DTC Exato...</p>";

            // Procure esta linha e mude para:
const { data: falhas } = await supabaseClient.from('falhas_dtc').select('*').or(`codigo.eq.${buscaRaw},descricao.ilike.%${buscaRaw}%`);
            const { data: relatos } = await supabaseClient.from('relatos_usuarios').select('*').eq('dtc_vinculado', buscaRaw).neq('status_info', 'pendente');

            resDiv.innerHTML = "";
            if (!falhas?.length && !relatos?.length) {
                resDiv.innerHTML = "<div class='card'>Nenhum registro encontrado para '" + buscaRaw + "'.</div>";
                return;
            }

            falhas.forEach(item => {
            const rDesteDTC = relatos?.filter(r => r.dtc_vinculado === item.codigo) || [];
            const ehECA = item.modulo === 'ECA' || item.codigo.startsWith('50');
            
            resDiv.innerHTML += `
            <div class='card' style="border-left: 4px solid ${ehECA ? 'var(--danger)' : 'var(--neon)'}; padding: 0;">
                <div style="background: #222; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
                    <span style="color: ${ehECA ? '#ff4444' : 'var(--neon)'}; font-weight: bold; letter-spacing: 1px;">
                        ${item.marca} | MÓDULO: ${item.modulo}
                    </span>
                    <button class="btn-pdf" onclick="gerarPDF('${item.codigo}', '${item.descricao}', '${item.solucao_vip}')">
                        <i class="fas fa-file-pdf"></i> GERAR LAUDO
                    </button>
                </div>

                <div style="padding: 20px;">
                    <h2 style="margin: 0 0 15px 0; color: #fff;">CÓDIGO DTC: ${item.codigo}</h2>
                    
                    <div style="display: flex; flex-direction: column; gap: 15px;">
                        
                        <div>
                            <b style="color: var(--neon); text-transform: uppercase; font-size: 11px;">1. Descrição da Falha</b>
                            <p style="margin: 5px 0; color: #ccc;">${item.descricao}</p>
                        </div>

                        <div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 5px;">
                            <b style="color: #ffaa00; text-transform: uppercase; font-size: 11px;">2. Causas Prováveis</b>
                            <p style="margin: 5px 0; color: #eee; font-style: italic;">
                                ${item.causas_provaveis || "Verificar chicote, conectores e alimentação do módulo."}
                            </p>
                        </div>

                        <div style="border: 1px solid ${ehECA ? 'red' : 'var(--neon)'}; padding: 10px; border-radius: 5px; background: ${ehECA ? 'rgba(255,0,0,0.05)' : 'rgba(0,212,255,0.05)'}">
                            <b style="color: ${ehECA ? 'red' : '#00ff00'}; text-transform: uppercase; font-size: 11px;">3. Ação Recomendada</b>
                            <p style="margin: 5px 0; color: #fff; font-weight: 500;">
                                ${item.solucao_vip || "Realizar teste de diagnóstico via SDP3 ou Multímetro."}
                            </p>
                        </div>
                    </div>

                    ${ehECA ? `
                    <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #444; font-size: 12px; color: #888;">
                        <i class="fas fa-info-circle"></i> <b>Nota Técnica:</b> Unidade ECA requer calibração após manutenção física.
                    </div>` : ''}

                    ${rDesteDTC.length > 0 ? `
                        <div style="margin-top: 20px;">
                            <span style="font-size: 10px; color: #555; font-weight: bold;">RELATOS DE CAMPO (VIP)</span>
                            ${rDesteDTC.map(r => `
                                <div class="relato-box" style="border-left-color: ${r.status_info === 'vip' ? '#ffaa00' : '#00ff00'}">
                                    ${r.relato}
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
                
                <button class="btn-relatar" style="border-radius: 0 0 12px 12px;" onclick="enviarRelato('${item.codigo}', '${item.marca}')">
                    <i class="fas fa-edit"></i> ADICIONAR EXPERIÊNCIA TÉCNICA
                </button>
            </div>`;
        });
        // 4. Voz e Relatos
        function iniciarVoz() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';
            recognition.start();
            recognition.onresult = (e) => {
                document.getElementById('dtcInput').value = e.results[0][0].transcript.toUpperCase().replace(".","");
                buscarGeral();
            };
        }

        async function enviarRelato(cod, mar) {
            const txt = prompt("Como você resolveu esse problema?");
            if (txt) {
                await supabaseClient.from('relatos_usuarios').insert([{ dtc_vinculado: cod, marca: mar, relato: txt, usuario_nome: 'Leandro' }]);
                alert("Enviado para moderação!");
                buscarGeral();
            }
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
