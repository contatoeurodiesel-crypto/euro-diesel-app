<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DTC - Master Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00d4ff; 
            --bg: #0a0a0a; 
            --card: #151515; 
            --vip: #ffaa00; 
            --danger: #ff4444;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px var(--neon); text-align: center; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; user-select: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-card { background: var(--card); border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-number { display: block; font-size: 18px; font-weight: bold; color: var(--neon); }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; background: #222; border-radius: 8px; border: 1px solid #444; padding: 5px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; background: transparent; color: #fff; outline: none; font-size: 16px; }
        .btn-voz { background: none; border: none; color: var(--neon); font-size: 20px; cursor: pointer; padding: 0 10px; }
        .btn-busca { background: var(--neon); color: #000; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .relato-box {
    background: rgba(0, 212, 255, 0.05);
    border-left: 3px solid var(--neon);
    padding: 10px;
    margin-top: 8px;
    border-radius: 4px;
    font-size: 13px;
    color: #eee;
}
        .btn-relatar { background: transparent; border: 1px solid #444; color: #888; padding: 8px; border-radius: 6px; width: 100%; margin-top: 15px; cursor: pointer; font-size: 11px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #333; }
        .btn-pdf { background: #555; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>
    <h1 class="neon-text" ondblclick="acessoAdmin()">EURO <span style="color:white">DTC</span> MASTER</h1>
    
    <div class="dashboard">
        <div class="stat-card"> <span class="stat-number" id="countScania">--</span> <span class="stat-label">Scania</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countVolvo">--</span> <span class="stat-label">Volvo</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countParams">--</span> <span class="stat-label">Progs</span> </div>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="dtcInput" placeholder="Código DTC ou Peça...">
            <button class="btn-voz" onclick="iniciarVoz()"><i class="fas fa-microphone"></i></button>
            <button class="btn-busca" onclick="buscarGeral()">BUSCAR</button>
        </div>
    </div>

    <div id="resultado"></div>

    <script>
        const _URL = "https://dslhbphcegqgsraxvsgd.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbGhicGhjZWdxZ3NyYXh2c2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk1NjgsImV4cCI6MjA5MDQwNTU2OH0.qGS7nMN1EXw2MhOFL8ur-U6zrxYSppOk0puIUpuE--s";
        const supabaseClient = supabase.createClient(_URL, _KEY);

        const inteligenciaDTC = {
            "50000": {
                "gravidade": "CRÍTICA",
                "tempo_estimado_reparo": "1.5 horas",
                "ferramentas_necessarias": ["Multímetro", "SDP3", "Kit de Reparo de Pinos"],
                "passo_a_passo": [
                    "1. Validar alimentação no pino X1/1.",
                    "2. Verificar resistência da bobina (deve ser 12 Ohms).",
                    "3. Executar calibração via software."
                ],
                "alerta_mestre": "Não troque o módulo sem testar o aterramento da carcaça!"
            }
        };

        function acessoAdmin() {
            const senha = prompt("Acesso Restrito. Digite o código mestre:");
            if (senha === "1234") { window.location.href = "admin.html"; }
            else { alert("Acesso negado."); }
        }

        async function initDashboard() {
            try {
                const { count: s } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).ilike('marca', 'Scania');
                const { count: v } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).ilike('marca', 'Volvo');
                const { count: p } = await supabaseClient.from('parametros_programacao').select('*', { count: 'exact', head: true });
                
                document.getElementById('countScania').innerText = s ?? 0;
                document.getElementById('countVolvo').innerText = v ?? 0;
                document.getElementById('countParams').innerText = p ?? 0;
            } catch (e) { console.error("Erro Dashboard:", e); }
        }

        async function buscarGeral() {
    let buscaRaw = document.getElementById('dtcInput').value.trim().toUpperCase();
    if(!buscaRaw) return;
    
    const resDiv = document.getElementById('resultado');
    resDiv.innerHTML = "<p style='text-align:center; color:var(--neon)'>Analisando Protocolo Master...</p>";

    // --- ESTRATÉGIA DE BUSCA EXPERT ---
    
    // 1. Tenta encontrar EXATAMENTE o que o técnico digitou
    let { data: falhas, error: errF } = await supabaseClient
        .from('falhas_dtc')
        .select('*')
        .eq('codigo', buscaRaw);

    // 2. Se não achou e o código tem 4 dígitos (ex: 5018), tenta o padrão Scania (50180)
    if ((!falhas || falhas.length === 0) && buscaRaw.startsWith('50') && buscaRaw.length === 4) {
        const codigoSugestao = buscaRaw + '0';
        const { data: falhasScania } = await supabaseClient
            .from('falhas_dtc')
            .select('*')
            .eq('codigo', codigoSugestao);

        if (falhasScania && falhasScania.length > 0) {
            falhas = falhasScania;
            buscaRaw = codigoSugestao; // Atualiza para o laudo sair correto
        }
    }

    // 3. Busca Relatos vinculados ao código final definido
    const { data: relatos } = await supabaseClient
        .from('relatos_usuarios')
        .select('*')
        .eq('dtc_vinculado', buscaRaw)
        .neq('status_info', 'pendente');

    resDiv.innerHTML = "";

    // Validação de erro ou busca vazia
    if (errF || (!falhas?.length && !relatos?.length)) {
        resDiv.innerHTML = `
            <div class='card' style="border-left: 4px solid var(--danger);">
                <h3 style="color: var(--danger);">CÓDIGO ${buscaRaw} NÃO LOCALIZADO</h3>
                <p>O protocolo informado não consta na Master Intelligence da Euro Diesel. Verifique o código e tente novamente.</p>
            </div>`;
        return;
    }

    // 4. Renderização com distinção de Marca e Módulo
    // ... (Mantenha o início da função buscarGeral igual até a parte do forEach)

        falhas.forEach(item => {
            const ehECA = item.modulo === 'ECA' || item.codigo.startsWith('50');
            const rDesteDTC = relatos?.filter(r => r.dtc_vinculado === item.codigo) || [];
            const extra = inteligenciaDTC[item.codigo];
            
            let htmlExtra = '';
            if (extra) {
                htmlExtra = `
                    <div style="margin-top: 15px; border: 1px solid var(--vip); padding: 15px; border-radius: 8px; background: rgba(255,170,0,0.05);">
                        <b style="color: var(--vip); font-size: 11px;"><i class="fas fa-brain"></i> ROTEIRO MASTER EURO DIESEL</b>
                        <p style="font-size:12px; color:#aaa; margin: 5px 0;">Tempo: ${extra.tempo_estimado_reparo} | Ferramentas: ${extra.ferramentas_necessarias.join(', ')}</p>
                        <div style="margin-top:10px; font-size: 13px; color: #eee;">
                            ${extra.passo_a_passo.map(p => `<div style="margin-bottom:5px;"><i class="fas fa-check-circle" style="color:#00ff00"></i> ${p}</div>`).join('')}
                        </div>
                        <div style="margin-top: 10px; color: var(--danger); font-size: 12px; font-weight: bold;">
                            <i class="fas fa-exclamation-triangle"></i> ${extra.alerta_mestre}
                        </div>
                    </div>`;
            }

            // Limpeza de texto para evitar erro no onclick do PDF
            const descLimpa = item.descricao.replace(/'/g, "\\'").replace(/\n/g, " ");
            const solLimpa = item.solucao_vip.replace(/'/g, "\\'").replace(/\n/g, " ");

            resDiv.innerHTML += `
            <div class='card' style="border-left: 4px solid ${ehECA ? 'var(--danger)' : 'var(--neon)'}; padding: 0; overflow: hidden; margin-bottom: 25px;">
                <div style="background: #1a1a1a; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333;">
                    <span style="color: #888; font-size: 11px; font-weight: bold; letter-spacing: 1px;">
                        <i class="fas fa-microchip"></i> SISTEMA DE DIAGNÓSTICO AVANÇADO
                    </span>
                    <button class="btn-pdf" onclick="gerarLaudo('${item.codigo}', '${item.marca}', '${item.modulo}', '${descLimpa}', '${solLimpa}')">
                        <i class="fas fa-file-pdf"></i> GERAR RELATÓRIO
                    </button>
                </div>

                <div style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                        <div>
                            <h2 style="margin: 0; font-size: 28px; color: #fff;">${item.codigo}</h2>
                            <span style="color: var(--neon); font-size: 12px; font-weight: bold;">MÓDULO: ${item.modulo} | ${item.marca.toUpperCase()}</span>
                        </div>
                        <span class="badge" style="background: ${ehECA ? 'rgba(255,68,68,0.2)' : 'rgba(0,212,255,0.2)'}; color: ${ehECA ? 'var(--danger)' : 'var(--neon)'}; border: 1px solid; padding: 5px 10px;">
                            ${ehECA ? 'SISTEMA CRÍTICO' : 'VERIFICAÇÃO PADRÃO'}
                        </span>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr; gap: 15px;">
                        <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px;">
                            <b style="color: var(--neon); display: block; margin-bottom: 5px; font-size: 11px;"><i class="fas fa-eye"></i> 1. NO SOFTWARE (SDP3/TECH TOOL)</b>
                            <p style="margin: 0; font-size: 14px; color: #ccc;">${item.descricao}</p>
                        </div>

                        <div style="background: rgba(0,255,0,0.05); border: 1px solid rgba(0,255,0,0.2); padding: 15px; border-radius: 8px;">
                            <b style="color: #00ff00; display: block; margin-bottom: 5px; font-size: 11px;"><i class="fas fa-bolt"></i> 2. TESTE DE GRANDEZA ELÉTRICA</b>
                            <div style="font-family: monospace; font-size: 13px; color: #fff;">
                                Sinal esperado: <span style="color: #00ff00;">0.15V ~ 3.70V</span><br>
                                Resistência CAN: <span style="color: #00ff00;">60 Ohms (nominal)</span>
                            </div>
                        </div>

                        ${htmlExtra}

                        <div style="background: var(--neon); color: #000; padding: 15px; border-radius: 8px; font-weight: bold;">
                            <i class="fas fa-tools"></i> 3. PROCEDIMENTO MASTER EURO DIESEL
                            <p style="margin: 5px 0 0; font-size: 15px;">${item.solucao_vip}</p>
                        </div>
                    </div>

                    ${rDesteDTC.length > 0 ? `
                        <div style="margin-top: 20px; border-top: 1px dashed #444; padding-top: 15px;">
                            <span style="font-size: 11px; color: #888; font-weight: bold;"><i class="fas fa-history"></i> HISTÓRICO DE SUCESSO EM CAMPO</span>
                            ${rDesteDTC.map(r => `<div class="relato-box" style="background: #111; border-color: #333;">${r.relato}</div>`).join('')}
                        </div>
                    ` : ''}
                </div>

                <button class="btn-relatar" style="background: #222; border: none; padding: 15px; color: var(--neon); font-weight: bold; cursor: pointer; width: 100%;" onclick="enviarRelato('${item.codigo}', '${item.marca}')">
                    <i class="fas fa-plus"></i> ALIMENTAR INTELIGÊNCIA COM NOVO DIAGNÓSTICO
                </button>
            </div>`;
        });
    } // Fim da função buscarGeral

        function iniciarVoz() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';
            recognition.start();
            recognition.onresult = (e) => {
                document.getElementById('dtcInput').value = e.results[0][0].transcript.toUpperCase().replace(".","");
                buscarGeral();
            };
        }

        async function enviarRelato(cod, mar) {
            const txt = prompt("Como você resolveu esse problema?");
            if (txt) {
                await supabaseClient.from('relatos_usuarios').insert([{ dtc_vinculado: cod, marca: mar, relato: txt, usuario_nome: 'Leandro', status_info: 'pendente' }]);
                alert("Enviado para moderação!");
                buscarGeral();
            }
        }

        function gerarLaudo(codigo, marca, modulo, desc, solucao) {
    const win = window.open('', '_blank');
    win.document.write(`
        <html><head><title>Laudo - ${codigo}</title><style>
            body { font-family: sans-serif; padding: 40px; color: #333; line-height: 1.5; }
            .header { border-bottom: 3px solid #00d4ff; padding-bottom: 10px; margin-bottom: 20px; }
            .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
            .box { background: #f4f4f4; padding: 15px; margin: 20px 0; border-radius: 5px; border: 1px solid #ddd; }
            h3 { color: #00d4ff; margin-top: 20px; border-bottom: 1px solid #eee; }
            .footer { margin-top: 50px; border-top: 1px solid #ccc; padding-top: 10px; text-align: center; font-size: 12px; }
        </style></head><body>
            <div class="header"><div class="logo">EURO DIESEL MECATRÔNICA</div></div>
            <div class="box"><b>VEÍCULO:</b> ${marca.toUpperCase()} | <b>MÓDULO:</b> ${modulo} | <b>CÓDIGO:</b> ${codigo}</div>
            <h3>DIAGNÓSTICO TÉCNICO</h3><p>${desc}</p>
            <h3>PROCEDIMENTO DE REPARO</h3><p>${solucao}</p>
            <div class="footer"><b>Responsável Técnico: Leandro - Euro Diesel</b></div>
            <script>setTimeout(() => { window.print(); window.close(); }, 500);<\/script>
        </body></html>
    `);
    win.document.close();
}
        
        window.onload = initDashboard;
    </script>
</body>
</html>
