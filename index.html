<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DTC - Master Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon: #00d4ff; 
            --bg: #0a0a0a; 
            --card: #151515; 
            --vip: #ffaa00; 
            --danger: #ff4444;
        }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px var(--neon); text-align: center; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; user-select: none; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-card { background: var(--card); border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-number { display: block; font-size: 18px; font-weight: bold; color: var(--neon); }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; background: #222; border-radius: 8px; border: 1px solid #444; padding: 5px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; background: transparent; color: #fff; outline: none; font-size: 16px; }
        .btn-voz { background: none; border: none; color: var(--neon); font-size: 20px; cursor: pointer; padding: 0 10px; }
        .btn-busca { background: var(--neon); color: #000; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .relato-box {
    background: rgba(0, 212, 255, 0.05);
    border-left: 3px solid var(--neon);
    padding: 10px;
    margin-top: 8px;
    border-radius: 4px;
    font-size: 13px;
    color: #eee;
}
        .btn-relatar { background: transparent; border: 1px solid #444; color: #888; padding: 8px; border-radius: 6px; width: 100%; margin-top: 15px; cursor: pointer; font-size: 11px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #333; }
        .btn-pdf { background: #555; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>
    <h1 class="neon-text" ondblclick="acessoAdmin()">EURO <span style="color:white">DTC</span> MASTER</h1>
    
    <div class="dashboard">
        <div class="stat-card"> <span class="stat-number" id="countScania">--</span> <span class="stat-label">Scania</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countVolvo">--</span> <span class="stat-label">Volvo</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countParams">--</span> <span class="stat-label">Progs</span> </div>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="dtcInput" placeholder="Código DTC ou Peça...">
            <button class="btn-voz" onclick="iniciarVoz()"><i class="fas fa-microphone"></i></button>
            <button class="btn-busca" onclick="buscarGeral()">BUSCAR</button>
        </div>
    </div>

    <div id="resultado"></div>

    <script>
    const _URL = "https://dslhbphcegqgsraxvsgd.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbGhicGhjZWdxZ3NyYXh2c2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk1NjgsImV4cCI6MjA5MDQwNTU2OH0.qGS7nMN1EXw2MhOFL8ur-U6zrxYSppOk0puIUpuE--s"; 
    const supabaseClient = supabase.createClient(_URL, _KEY);

    const inteligenciaDTC = {
        "50000": {
            "modulo": "GMS OPC5 ECA",
            "acao": [
                "Desconecte os conectores de chicote ao ECA e verifique se os pinos estão gastos.",
                "Se os pinos estiverem gastos, substitua o chicote de cabos ao ECA e à caixa de mudanças.",
                "Verifique a tensão de alimentação ao ECA.",
                "Substitua o ECA se a falha persistir."
            ],
            "causa": "Mensagem aguardada da unidade ECA desapareceu ou está faltando. Pode ser circuito aberto no chicote CAN ou na alimentação.",
            "deteccao": "Prazo esgotado na mensagem CAN (faltou por mais de 5 vezes).",
            "reacao": "O veículo não arrancará quando a posição de ponto morto for engatada na frenagem."
        },
        "12345": {
            "modulo": "EMS",
            "acao": ["Verificar chicote", "Testar continuidade do sensor de pressão"],
            "causa": "Curto circuito ou falha de aterramento",
            "deteccao": "Sinal acima do limite por mais de 2 segundos",
            "reacao": "Veículo entra em modo de segurança (limp mode)"
        }
    };

    async function buscarGeral() {
        let buscaRaw = document.getElementById('dtcInput').value.trim().toUpperCase();
        if(!buscaRaw) return;
        
        const resDiv = document.getElementById('resultado');
        resDiv.innerHTML = "<p style='text-align:center; color:var(--neon)'>Acessando Protocolos Master Euro Diesel...</p>";

        let { data: falhas, error: errF } = await supabaseClient.from('falhas_dtc').select('*').eq('codigo', buscaRaw);
        
        // Suporte Scania 4 dígitos
        if ((!falhas || falhas.length === 0) && buscaRaw.startsWith('50') && buscaRaw.length === 4) {
            const { data: fScania } = await supabaseClient.from('falhas_dtc').select('*').eq('codigo', buscaRaw + '0');
            if (fScania?.length > 0) { falhas = fScania; buscaRaw = buscaRaw + '0'; }
        }

        const { data: relatos } = await supabaseClient.from('relatos_usuarios').select('*').eq('dtc_vinculado', buscaRaw).neq('status_info', 'pendente');

        resDiv.innerHTML = "";

        if (errF || (!falhas?.length && !relatos?.length)) {
            resDiv.innerHTML = `<div class='card' style="border-left: 4px solid var(--danger);"><h3 style="color:var(--danger)">CÓDIGO ${buscaRaw} NÃO LOCALIZADO</h3></div>`;
            return;
        }

        falhas.forEach(item => {
            const infoTecnica = inteligenciaDTC[item.codigo];
            let htmlConteudoTecnico = '';

            if (infoTecnica) {
                htmlConteudoTecnico = `
                    <div style="margin-top: 15px; border: 1px solid #444; border-radius: 8px; background: #1a1e22; overflow: hidden;">
                        <div style="background: #2c3e50; padding: 10px; font-weight: bold; color: var(--neon); font-size: 11px;">
                            <i class="fas fa-microchip"></i> ANÁLISE TÉCNICA AVANÇADA
                        </div>
                        <div style="padding: 15px; font-size: 13px; line-height: 1.6;">
                            <b style="color:var(--neon)">AÇÃO RECOMENDADA:</b>
                            <ul style="margin: 5px 0 10px 18px; color: #ccc;">
                                ${infoTecnica.acao.map(a => `<li>${a}</li>`).join('')}
                            </ul>
                            <b style="color:var(--neon)">CAUSA PROVÁVEL:</b> <p style="margin: 0 0 10px 0; color:#ccc;">${infoTecnica.causa}</p>
                            <b style="color:var(--neon)">CONDIÇÃO DE DETECÇÃO:</b> <p style="margin: 0 0 10px 0; color:#ccc;">${infoTecnica.deteccao}</p>
                            <b style="color:var(--danger)">REAÇÃO DO SISTEMA:</b> <p style="margin: 0; color:#ffaaaa;">${infoTecnica.reacao}</p>
                        </div>
                    </div>`;
            }

            // Sanitização simples para evitar erro no botão PDF
            const descSegura = item.descricao.replace(/'/g, "&apos;").replace(/\n/g, " ");
            const solSegura = item.solucao_vip.replace(/'/g, "&apos;").replace(/\n/g, " ");

            resDiv.innerHTML += `
                <div class='card' style="border-left: 4px solid var(--neon); padding: 0; overflow: hidden; margin-bottom: 25px;">
                    <div style="background: #1a1a1a; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;">
                        <span style="color: #888; font-size: 10px;">EURO DIESEL - MECATRÔNICA NACIONAL</span>
                        <button class="btn-pdf" onclick="gerarLaudo('${item.codigo}', '${item.marca}', '${item.modulo}', '${descSegura}', '${solSegura}')">GERAR LAUDO</button>
                    </div>
                    <div style="padding: 20px;">
                        <h2 style="margin:0; font-size: 28px;">${item.codigo}</h2>
                        <span style="color: var(--neon); font-size: 12px; font-weight: bold;">SISTEMA: ${item.modulo} | MARCA: ${item.marca}</span>
                        <p style="background:rgba(255,255,255,0.03); padding:12px; border-radius:6px; color:#ddd; border: 1px solid #333; margin-top:10px;">
                            <b>DESCRIÇÃO:</b> ${item.descricao}
                        </p>
                        ${htmlConteudoTecnico} 
                        <div style="margin-top:15px; background: linear-gradient(90deg, #00d4ff, #008fb3); color:#000; padding:15px; border-radius:8px; font-weight:bold;">
                            <i class="fas fa-check-circle"></i> SOLUÇÃO MASTER: ${item.solucao_vip}
                        </div>
                        ${relatos && relatos.filter(r => r.dtc_vinculado === item.codigo).length > 0 ? `
                            <div style="margin-top:20px; border-top:1px dashed #444; padding-top:15px;">
                                <span style="font-size:11px; color:var(--neon); font-weight:bold;">HISTÓRICO DE CAMPO:</span>
                                ${relatos.filter(r => r.dtc_vinculado === item.codigo).map(r => `<div class="relato-box">${r.relato}</div>`).join('')}
                            </div>` : ''}
                    </div>
                    <button class="btn-relatar" onclick="enviarRelato('${item.codigo}', '${item.marca}')">
                        <i class="fas fa-plus-circle"></i> ADICIONAR CONHECIMENTO
                    </button>
                </div>`;
        });
    }

    async function initDashboard() {
        try {
            const { count: s } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).ilike('marca', 'Scania');
            const { count: v } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).ilike('marca', 'Volvo');
            document.getElementById('countScania').innerText = s || 0;
            document.getElementById('countVolvo').innerText = v || 0;
            document.getElementById('countParams').innerText = "OK";
        } catch (e) { console.error(e); }
    }

    function iniciarVoz() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'pt-BR';
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById('dtcInput').value = e.results[0][0].transcript.toUpperCase().replace(".","");
            buscarGeral();
        };
    }

    async function enviarRelato(cod, mar) {
        const txt = prompt("Como você resolveu esse problema?");
        if (txt) {
            await supabaseClient.from('relatos_usuarios').insert([{ dtc_vinculado: cod, marca: mar, relato: txt, usuario_nome: 'Leandro', status_info: 'pendente' }]);
            alert("Enviado para moderação!");
            buscarGeral();
        }
    }

    function gerarLaudo(codigo, marca, modulo, desc, solucao) {
        const win = window.open('', '_blank');
        win.document.write(`
            <html><head><title>Laudo Euro Diesel - \${codigo}</title><style>
                body { font-family: 'Segoe UI', sans-serif; padding: 40px; color: #333; line-height: 1.5; }
                .header { border-bottom: 4px solid #00d4ff; padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
                .logo { font-size: 28px; font-weight: bold; color: #00d4ff; letter-spacing: 1px; }
                .info-box { background: #f8f9fa; padding: 20px; margin: 20px 0; border-radius: 8px; border: 1px solid #dee2e6; }
                h3 { color: #008fb3; margin-top: 25px; border-left: 4px solid #00d4ff; padding-left: 10px; }
                .footer { margin-top: 60px; border-top: 1px solid #eee; padding-top: 20px; text-align: center; font-size: 12px; color: #777; }
                @media print { .no-print { display: none; } }
            </style></head><body>
                <div class="header">
                    <div class="logo">EURO DIESEL MECATRÔNICA</div>
                    <div style="text-align:right; font-size: 10px;">RELATÓRIO TÉCNICO OFICIAL</div>
                </div>
                <div class="info-box">
                    <b>VEÍCULO:</b> \${marca.toUpperCase()} <br>
                    <b>MÓDULO:</b> \${modulo} <br>
                    <b>CÓDIGO DA FALHA:</b> <span style="font-size: 20px; color: #d9534f;">\${codigo}</span>
                </div>
                <h3>DESCRIÇÃO DO SISTEMA</h3><p>\${desc}</p>
                <h3>PROCEDIMENTO DE REPARO MASTER</h3>
                <div style="background: #eefdff; padding: 15px; border-radius: 5px; border-left: 5px solid #00d4ff;">\${solucao}</div>
                <div class="footer">
                    <b>Responsável Técnico: Leandro - Euro Diesel Mecatrônica</b><br>
                    Este documento é uma síntese baseada em protocolos avançados de diagnóstico mecatrônico.
                </div>
                <script>setTimeout(() => { window.print(); window.close(); }, 700);<\/script>
            </body></html>
        `);
        win.document.close();
    }

    function acessoAdmin() {
        let senha = prompt("Acesso Restrito:");
        if(senha === "1234") window.location.href = "admin.html";
    }

    window.onload = initDashboard;
</script>
</body>
</html>
