<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DTC IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .neon-text { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; padding: 20px; text-transform: uppercase; }
        .card { background: #151515; border: 1px solid #333; border-radius: 10px; padding: 20px; margin: 20px auto; max-width: 450px; text-align: left; position: relative; }
        .input-area { text-align: center; }
        input { padding: 15px; border-radius: 5px; border: 1px solid #333; width: 85%; margin-bottom: 10px; background: #222; color: #fff; font-size: 16px; }
        button { background: #00d4ff; color: #000; padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 92%; font-size: 16px; transition: 0.3s; }
        button:hover { background: #008eb3; }
        
        /* Estilos da Resposta */
        .badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-size: 0.75em; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .badge-marca { background: #00d4ff; color: #000; margin-right: 5px; }
        .badge-modulo { background: #444; color: #fff; }
        .vip-box { border: 1px dashed #ff4444; color: #ff4444; padding: 15px; margin-top: 15px; border-radius: 5px; text-align: center; font-weight: bold; }
        .master-solucao { border: 1px solid #00ff00; color: #00ff00; padding: 15px; margin-top: 15px; border-radius: 5px; }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <h1 class="neon-text">EURO <span style="color:white">DIESEL</span> TECH</h1>
    
    <div class="card input-area">
        <input type="text" id="dtcInput" placeholder="CÓDIGO DTC (Ex: 4021 ou 102)">
        <button onclick="buscarFalha()">CONSULTAR IA MASTER</button>
    </div>

    <div id="resultado"></div>

    <script>
        const _URL = "https://dslhbphcegqgsraxvsgd.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbGhicGhjZWdxZ3NyYXh2c2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk1NjgsImV4cCI6MjA5MDQwNTU2OH0.qGS7nMN1EXw2MhOFL8ur-U6zrxYSppOk0puIUpuE--s";
        const supabaseClient = supabase.createClient(_URL, _KEY);

        async function buscarFalha() {
            const input = document.getElementById('dtcInput');
            const codigo = input.value.trim();
            const resDiv = document.getElementById('resultado');
            
            if (!codigo) {
                alert("Por favor, digite um código!");
                return;
            }

            resDiv.innerHTML = "<p class='loading'>Buscando nos módulos Scania e Volvo...</p>";

            try {
                const { data, error } = await supabaseClient
                    .from('falhas_dtc')
                    .select('*')
                    .eq('codigo', codigo);

                if (error) {
                    resDiv.innerHTML = `<div class='card' style='color:red'>Erro de conexão: ${error.message}</div>`;
                    return;
                }

                if (!data || data.length === 0) {
                    resDiv.innerHTML = `<div class='card' style='text-align:center'>Código <b>${codigo}</b> não encontrado.<br><br><span style='color:#888'>Relatando falha para o ADM Master revisar.</span></div>`;
                    return;
                }

                resDiv.innerHTML = ""; // Limpa o carregando

                data.forEach(item => {
                    let html = `
                    <div class='card'>
                        <div>
                            <span class='badge badge-marca'>${item.marca || 'SISTEMA'}</span>
                            <span class='badge badge-modulo'>ECU: ${item.modulo || 'Geral'}</span>
                        </div>
                        <h2 style='color:#00d4ff; margin-top: 10px;'>DTC: ${item.codigo}</h2>
                        <p><b>Descrição:</b> ${item.descricao}</p>
                        <p><b>Ação de Fábrica:</b> ${item.solucao_publica}</p>
                    `;

                    if (item.status === 'vip') {
                        html += `<div class='vip-box'>🔒 SOLUÇÃO MASTER RESTRITA (ASSINANTES VIP)</div>`;
                    } else {
                        html += `
                        <div class='master-solucao'>
                            <b>💡 SOLUÇÃO MASTER (EURO DTC):</b><br>
                            ${item.solucao_vip}
                        </div>`;
                    }

                    html += `</div>`;
                    resDiv.innerHTML += html;
                });

            } catch (err) {
                resDiv.innerHTML = `<div class='card' style='color:orange'>Erro de Sistema: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
