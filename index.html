<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DTC - Relatórios Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --neon: #00d4ff; --bg: #0a0a0a; --card: #151515; --scania: #e10000; --volvo: #003087; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .neon-text { color: var(--neon); text-shadow: 0 0 15px var(--neon); text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-card { background: var(--card); border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-number { display: block; font-size: 18px; font-weight: bold; color: var(--neon); }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; outline: none; }
        button { background: var(--neon); color: #000; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 8px; display: inline-block; }
        .badge-scania { background: var(--scania); color: #fff; }
        .badge-volvo { background: var(--volvo); color: #fff; }
        .btn-pdf { background: #ff4444; color: white; margin-top: 10px; width: 100%; font-size: 12px; }
    </style>
</head>
<body>

    <h1 class="neon-text">EURO <span style="color:white">DTC</span> MASTER</h1>
    
    <div class="dashboard">
        <div class="stat-card"> <span class="stat-number" id="countScania">--</span> <span class="stat-label">Scania</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countVolvo">--</span> <span class="stat-label">Volvo</span> </div>
        <div class="stat-card"> <span class="stat-number" id="countParams">--</span> <span class="stat-label">Progs</span> </div>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="dtcInput" placeholder="Código DTC ou Parâmetro">
            <button onclick="buscarGeral()">DIAGNOSTICAR</button>
        </div>
    </div>

    <div id="resultado"></div>

    <script>
        const _URL = "https://dslhbphcegqgsraxvsgd.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbGhicGhjZWdxZ3NyYXh2c2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk1NjgsImV4cCI6MjA5MDQwNTU2OH0.qGS7nMN1EXw2MhOFL8ur-U6zrxYSppOk0puIUpuE--s";
        const supabaseClient = supabase.createClient(_URL, _KEY);

        async function initDashboard() {
            const { count: s } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).eq('marca', 'Scania');
            const { count: v } = await supabaseClient.from('falhas_dtc').select('*', { count: 'exact', head: true }).eq('marca', 'Volvo');
            const { count: p } = await supabaseClient.from('parametros_programacao').select('*', { count: 'exact', head: true });
            document.getElementById('countScania').innerText = s || 0;
            document.getElementById('countVolvo').innerText = v || 0;
            document.getElementById('countParams').innerText = p || 0;
        }

        async function buscarGeral() {
            let buscaRaw = document.getElementById('dtcInput').value.trim();
            const buscaNumerica = buscaRaw.replace(/\D/g, ""); 
            const resDiv = document.getElementById('resultado');
            resDiv.innerHTML = "Processando...";

            const { data: falhas } = await supabaseClient.from('falhas_dtc').select('*').or(`codigo.eq."${buscaRaw}",codigo.eq."${buscaNumerica}"`);
            const { data: params } = await supabaseClient.from('parametros_programacao').select('*').or(`descricao_procedimento.ilike.%${buscaRaw}%,parametro_original.ilike.%${buscaRaw}%`);

            resDiv.innerHTML = "";

            falhas?.forEach(item => {
                const bClass = item.marca.toLowerCase() === 'scania' ? 'badge-scania' : 'badge-volvo';
                resDiv.innerHTML += `
                <div class='card'>
                    <span class='badge ${bClass}'>${item.marca} | ${item.modulo}</span>
                    <h2 style='color:var(--neon)'>DTC ${item.codigo}</h2>
                    <p><b>Análise:</b> ${item.descricao}</p>
                    <p style='color:#00ff00'><b>Solução Master:</b> ${item.solucao_vip}</p>
                    <button class="btn-pdf" onclick="gerarPDF('${item.marca}', '${item.codigo}', '${item.descricao}', '${item.solucao_vip}')">GERAR RELATÓRIO TÉCNICO PDF</button>
                </div>`;
            });

            params?.forEach(p => {
                resDiv.innerHTML += `
                <div class='card' style='border-left: 4px solid #ffaa00'>
                    <span class='badge' style='background:#ffaa00;color:#000'>PROGRAMAÇÃO | ${p.marca}</span>
                    <h2 style='color:#ffaa00'>${p.descricao_procedimento}</h2>
                    <p><b>Procedimento:</b> ${p.parametro_original} ➔ ${p.parametro_modificado}</p>
                    <button class="btn-pdf" style="background:#ffaa00;color:#000" onclick="gerarPDF('${p.marca}', 'Prog', '${p.descricao_procedimento}', '${p.parametro_modificado}')">GERAR PDF DE PROGRAMAÇÃO</button>
                </div>`;
            });
        }

        function gerarPDF(marca, codigo, desc, sol) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22);
            doc.setTextColor(0, 212, 255);
            doc.text("EURO DIESEL - DIAGNÓSTICO MASTER", 20, 20);
            doc.setFontSize(12);
            doc.setTextColor(100);
            doc.text(`Relatório Gerado em: ${new Date().toLocaleString()}`, 20, 30);
            doc.line(20, 35, 190, 35);
            doc.setTextColor(0);
            doc.setFont(undefined, 'bold');
            doc.text(`VEÍCULO: ${marca}`, 20, 45);
            doc.text(`CÓDIGO/SISTEMA: ${codigo}`, 20, 55);
            doc.setFont(undefined, 'normal');
            doc.text("DESCRIÇÃO DA FALHA:", 20, 70);
            doc.text(doc.splitTextToSize(desc, 160), 20, 75);
            doc.setFont(undefined, 'bold');
            doc.setTextColor(0, 150, 0);
            doc.text("SOLUÇÃO TÉCNICA SUGERIDA:", 20, 100);
            doc.setFont(undefined, 'normal');
            doc.text(doc.splitTextToSize(sol, 160), 20, 105);
            doc.save(`Diagnostico_Euro_${codigo}.pdf`);
        }

        initDashboard();
    </script>
</body>
</html>
