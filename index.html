<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DTC IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; }
        .neon-text { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; padding: 20px; }
        .card { background: #151515; border: 1px solid #333; border-radius: 10px; padding: 20px; margin: 20px auto; max-width: 400px; }
        input { padding: 12px; border-radius: 5px; border: none; width: 80%; margin-bottom: 10px; background: #222; color: #fff; }
        button { background: #00d4ff; color: #000; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1 class="neon-text">EURO <span style="color:white">DIESEL</span> TECH</h1>
    <div class="card">
        <input type="text" id="dtcInput" placeholder="DIGITE O CÓDIGO DTC (Ex: 50000)">
        <button onclick="buscarFalha()">CONSULTAR IA</button>
    </div>
    <div id="resultado"></div>

    <script>
        const _URL = "https://dslhbphcegqgsraxvsgd.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbGhicGhjZWdxZ3NyYXh2c2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk1NjgsImV4cCI6MjA5MDQwNTU2OH0.qGS7nMN1EXw2MhOFL8ur-U6zrxYSppOk0puIUpuE--s";
        const supabaseClient = supabase.createClient(_URL, _KEY);

        async function buscarFalha() {
            const codigo = document.getElementById('dtcInput').value;
            const resDiv = document.getElementById('resultado');
            resDiv.innerHTML = "<p>Buscando no banco...</p>";

            try {
                const { data, error } = await supabaseClient
                    .from('falhas_dtc')
                    .select('*')
                    .eq('codigo', codigo.trim());

                if (error) {
                    resDiv.innerHTML = `<div class='card' style='color:red'>Erro no Banco: ${error.message}</div>`;
                    return;
                }

                if (!data || data.length === 0) {
                    resDiv.innerHTML = "<div class='card'>Código não encontrado no banco.</div>";
                    return;
                }

                const item = data[0];
                resDiv.innerHTML = `<div class='card'>
                    <h2 style='color:#00d4ff'>DTC: ${item.codigo}</h2>
                    <p><b>Descrição:</b> ${item.descricao}</p>
                    <p><b>Ação:</b> ${item.solucao_publica}</p>
                </div>`;
            } catch (err) {
                resDiv.innerHTML = `<div class='card' style='color:orange'>Erro de Sistema: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
