<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EURO DTC IA - MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .neon-text { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; padding: 15px; }
        .card { background: #151515; border: 1px solid #333; border-radius: 10px; padding: 20px; margin: 10px auto; max-width: 450px; text-align: left; }
        input { padding: 15px; border-radius: 5px; border: 1px solid #333; width: 88%; margin-bottom: 10px; background: #222; color: #fff; font-size: 16px; }
        button { background: #00d4ff; color: #000; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 95%; font-size: 16px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .badge-dtc { background: #ff4444; color: #fff; }
        .badge-param { background: #ffaa00; color: #000; }
        .vip-box { border: 1px dashed #00ff00; color: #00ff00; padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <h1 class="neon-text">EURO <span style="color:white">DIESEL</span> TECH</h1>
    
    <div class="card" style="text-align: center;">
        <input type="text" id="dtcInput" placeholder="DIGITE O DTC OU PARÂMETRO">
        <button onclick="buscarGeral()">CONSULTAR AGORA</button>
    </div>

    <div id="resultado"></div>

    <script>
        const _URL = "https://dslhbphcegqgsraxvsgd.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRzbGhicGhjZWdxZ3NyYXh2c2dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4Mjk1NjgsImV4cCI6MjA5MDQwNTU2OH0.qGS7nMN1EXw2MhOFL8ur-U6zrxYSppOk0puIUpuE--s";
        const supabaseClient = supabase.createClient(_URL, _KEY);

        async function buscarGeral() {
            const busca = document.getElementById('dtcInput').value.trim();
            const resDiv = document.getElementById('resultado');
            if(!busca) return;
            
            resDiv.innerHTML = "Pesquisando no Banco de Dados...";

            // 1. Busca na Tabela de Falhas (DTC)
            const { data: falhas } = await supabaseClient.from('falhas_dtc').select('*').ilike('codigo', `%${busca}%`);
            
            // 2. Busca na Tabela de Parâmetros
            const { data: params } = await supabaseClient.from('parametros_programacao').select('*').or(`descricao_procedimento.ilike.%${busca}%,parametro_original.ilike.%${busca}%`);

            resDiv.innerHTML = "";

            // MOSTRAR FALHAS ENCONTRADAS
            falhas?.forEach(item => {
                resDiv.innerHTML += `
                <div class='card'>
                    <span class='badge badge-dtc'>FALHA DTC | ${item.marca} | ${item.modulo}</span>
                    <h2 style='color:#00d4ff; margin: 5px 0;'>CÓDIGO: ${item.codigo}</h2>
                    <p><b>O que é:</b> ${item.descricao}</p>
                    <p><b>Causa comum:</b> ${item.solucao_publica}</p>
                    <div class='vip-box'>💎 SOLUÇÃO MASTER: ${item.solucao_vip}</div>
                </div>`;
            });

            // MOSTRAR PARÂMETROS ENCONTRADOS
            params?.forEach(p => {
                resDiv.innerHTML += `
                <div class='card'>
                    <span class='badge badge-param'>PROGRAMAÇÃO | ${p.marca}</span>
                    <h2 style='color:#ffaa00; margin: 5px 0;'>${p.descricao_procedimento}</h2>
                    <p><b>Sistema:</b> ${p.sistema}</p>
                    <p><b>Original:</b> ${p.parametro_original} ➔ <b>Modificar:</b> ${p.parametro_modificado}</p>
                    <small>Ferramenta: ${p.ferramenta}</small>
                </div>`;
            });

            if (resDiv.innerHTML === "") {
                resDiv.innerHTML = "<div class='card'>Nenhum resultado encontrado para essa busca.</div>";
            }
        }
    </script>
</body>
</html>
